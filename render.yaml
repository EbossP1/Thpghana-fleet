# ─────────────────────────────────────────────────────────────────
# Render.com deployment — if you don't want to manage a VPS at all
# Push to GitHub, connect to Render, and it deploys automatically
# ─────────────────────────────────────────────────────────────────
services:
  - type: web
    name: thp-fleet
    runtime: python
    buildCommand: pip install -r backend/requirements.txt gunicorn
    startCommand: gunicorn backend.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT -w 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
    healthCheckPath: /
    autoDeploy: true
